services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sharepwd}
      POSTGRES_USER: ${POSTGRES_USER:-sharepwd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-umami.sh:/docker-entrypoint-initdb.d/init-umami.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharepwd}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sharepwd}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sharepwd}?sslmode=disable
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-sharepwd}
      S3_USE_SSL: "false"
      LISTEN_ADDR: ":8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      GRACE_PERIOD_MINUTES: ${GRACE_PERIOD_MINUTES:-2}
      MAX_TEXT_SIZE: ${MAX_TEXT_SIZE:-102400}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-104857600}
      CLEANUP_INTERVAL: ${CLEANUP_INTERVAL:-60s}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  umami:
    build:
      context: https://github.com/umami-software/umami.git#v3.0.3
      args:
        DATABASE_TYPE: postgresql
        BASE_PATH: /analytics
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-changeme}@postgres:5432/umami
      DISABLE_UPDATES: "true"
      DISABLE_TELEMETRY: "true"
      APP_SECRET: ${UMAMI_APP_SECRET:-changeme}
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - umami

volumes:
  postgres_data:
  minio_data:
  certbot_webroot:
